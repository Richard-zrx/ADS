# Reference t-SNE config — point these at your own pipeline run (Step 2 OUTPUT_BASE).
# The phase5 parquet is named train_clustered_sorted_<N>.parquet, where <N> is your
# training-set row count; replace NUMROWS below accordingly.
ids_path: outputs/ads_run/all_ids.npy
embedding_path: outputs/ads_run/all_emb_mean.npy
clusters_parquet: outputs/ads_run/phase5/train_clustered_sorted_NUMROWS.parquet
output_dir: outputs/ads_run/phase5/tsne

normalize_embeddings: true
pca_dim: 50
tsne_perplexity: 30
tsne_n_iter: 1000
tsne_metric: cosine
tsne_init: pca
tsne_learning_rate: auto
random_seed: 42

figure_dpi: 200
scatter_size: 4
scatter_alpha: 0.7
